<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Historial</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style> body { padding: 14px; } </style>
</head>
<body class="bg-light">
  <div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4 class="mb-0">Historial</h4>
      <a class="btn btn-primary btn-sm" href="/nueva">Nueva cotización</a>
    </div>

    <div class="card">
      <div class="table-responsive">
        <table class="table table-sm align-middle mb-0">
          <thead>
            <tr>
              <th>N°</th>
              <th>Fecha</th>
              <th>Cliente</th>
              <th>Entrega</th>
              <th>Validez</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            {% for q in quotes %}
              <tr>
                <td>{{ "%06d"|format(q["quote_no"]) }}</td>
                <td>{{ q["created_at"] }}</td>
                <td>{{ q["client_name"] }}</td>
                <td>{{ q["delivery_time"] }}</td>
                <td>{{ q["validity_days"] }} día(s)</td>
                <td>
                  <a class="btn btn-sm btn-outline-secondary" href="/cotizacion/{{ q['id'] }}/pdf" target="_blank">PDF</a>
                </td>
              </tr>
            {% endfor %}
            {% if not quotes %}
              <tr><td colspan="6" class="text-center text-muted p-4">Sin cotizaciones todavía.</td></tr>
            {% endif %}
          </tbody>
        </table>
      </div>
    </div>
  </div>
</body>
</html>
