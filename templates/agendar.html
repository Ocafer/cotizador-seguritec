<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agendar Instalación</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style> body { padding: 14px; } .tecnico-tag { display:inline-flex; align-items:center; gap:4px; } </style>
</head>
<body class="bg-light">
  <div class="container" style="max-width:680px;">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <div>
        <h4 class="mb-0">Agendar Instalación</h4>
        <div class="text-muted small">{{ empresa }}</div>
      </div>
      <div class="d-flex gap-2">
        <a class="btn btn-outline-secondary btn-sm" href="/historial">Historial</a>
        <a class="btn btn-outline-success btn-sm" href="/agenda">Agenda</a>
        <a class="btn btn-outline-danger btn-sm" href="/logout">Salir</a>
      </div>
    </div>

    <div class="card mb-3">
      <div class="card-header"><strong>Cotización N° {{ "%06d"|format(q["quote_no"]) }}</strong></div>
      <div class="card-body">
        <p class="mb-1"><strong>Cliente:</strong> {{ q["client_name"] }}</p>
        <p class="mb-0 text-muted small">Creada: {{ q["created_at"] }}</p>
      </div>
    </div>

    <div class="card">
      <div class="card-body">
        <form method="post" action="/instalacion/{{ q['id'] }}/guardar" id="agendarForm">

          <div class="mb-3">
            <label class="form-label fw-bold">Fecha de instalación</label>
            <input type="date" class="form-control" name="fecha_instalacion" required
                   value="{{ instalacion.fecha_instalacion if instalacion else '' }}">
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">Técnicos asignados</label>
            <div id="tecnicosSeleccionados" class="d-flex flex-wrap gap-2 mb-2"></div>
            <input type="hidden" name="tecnicos_json" id="tecnicosJson" value="{{ tecnicos_asignados_json }}">

            {% if tecnicos_activos %}
            <div class="input-group mb-2">
              <select class="form-select" id="selectTecnico">
                <option value="">— Seleccionar técnico registrado —</option>
                {% for t in tecnicos_activos %}
                <option value="{{ t.id }}" data-nombre="{{ t.nombre|e }}">
                  {{ t.nombre }}{% if t.especialidad %} · {{ t.especialidad }}{% endif %}
                </option>
                {% endfor %}
              </select>
              <button type="button" class="btn btn-outline-primary" onclick="agregarDesdeLista()">+ Agregar</button>
            </div>
            {% endif %}

            <div class="input-group">
              <input type="text" class="form-control" id="tecnicoLibre" placeholder="O escribir nombre manualmente...">
              <button type="button" class="btn btn-outline-secondary" onclick="agregarLibre()">+ Agregar</button>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">Estado</label>
            <select class="form-select" name="estado">
              <option value="pendiente" {% if not instalacion or instalacion.estado == 'pendiente' %}selected{% endif %}>⏳ Pendiente</option>
              <option value="en_curso" {% if instalacion and instalacion.estado == 'en_curso' %}selected{% endif %}>🔧 En curso</option>
              <option value="completada" {% if instalacion and instalacion.estado == 'completada' %}selected{% endif %}>✅ Completada</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">Notas de instalación (opcional)</label>
            <textarea class="form-control" name="notas_instalacion" rows="3"
                      placeholder="Dirección, observaciones, materiales adicionales...">{{ instalacion.notas_instalacion if instalacion else '' }}</textarea>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success flex-grow-1">Guardar</button>
            <a href="/historial" class="btn btn-outline-secondary">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>

<script>
  let tecnicos = [];
  const initialJson = document.getElementById('tecnicosJson').value;
  if (initialJson) { try { tecnicos = JSON.parse(initialJson); } catch(e) { tecnicos = []; } }
  renderTags();

  function renderTags() {
    const container = document.getElementById('tecnicosSeleccionados');
    container.innerHTML = '';
    if (tecnicos.length === 0) {
      container.innerHTML = '<span class="text-muted small">Sin técnicos asignados aún.</span>';
    }
    tecnicos.forEach((t, idx) => {
      const span = document.createElement('span');
      span.className = 'badge bg-primary fs-6 d-inline-flex align-items-center gap-1';
      span.innerHTML = '🔧 ' + escHtml(t.nombre) + ' <button type="button" class="btn-close btn-close-white ms-1" style="font-size:0.6em;" onclick="quitarTecnico(' + idx + ')"></button>';
      container.appendChild(span);
    });
    document.getElementById('tecnicosJson').value = JSON.stringify(tecnicos);
  }

  function agregarDesdeLista() {
    const sel = document.getElementById('selectTecnico');
    const id = sel.value;
    const nombre = sel.options[sel.selectedIndex] ? sel.options[sel.selectedIndex].dataset.nombre : '';
    if (!id || !nombre) return;
    if (tecnicos.find(t => String(t.id) === String(id))) { sel.value = ''; return; }
    tecnicos.push({ id: parseInt(id), nombre: nombre });
    sel.value = '';
    renderTags();
  }

  function agregarLibre() {
    const inp = document.getElementById('tecnicoLibre');
    const nombre = inp.value.trim();
    if (!nombre) return;
    if (tecnicos.find(t => t.nombre.toLowerCase() === nombre.toLowerCase())) { inp.value = ''; return; }
    tecnicos.push({ id: null, nombre: nombre });
    inp.value = '';
    renderTags();
  }

  function quitarTecnico(idx) {
    tecnicos.splice(idx, 1);
    renderTags();
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  document.getElementById('tecnicoLibre').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); agregarLibre(); }
  });
</script>
</body>
</html>
