<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agendar Instalación</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style> body { padding: 14px; } </style>
</head>
<body class="bg-light">
  <div class="container" style="max-width:600px;">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <div>
        <h4 class="mb-0">Agendar Instalación</h4>
        <div class="text-muted small">{{ empresa }}</div>
      </div>
      <div class="d-flex gap-2">
        <a class="btn btn-outline-secondary btn-sm" href="/historial">Historial</a>
        <a class="btn btn-outline-danger btn-sm" href="/logout">Salir</a>
      </div>
    </div>

    <div class="card mb-3">
      <div class="card-header"><strong>Cotización N° {{ "%06d"|format(q["quote_no"]) }}</strong></div>
      <div class="card-body">
        <p class="mb-1"><strong>Cliente:</strong> {{ q["client_name"] }}</p>
        <p class="mb-0 text-muted small">Creada: {{ q["created_at"] }}</p>
      </div>
    </div>

    <div class="card">
      <div class="card-body">
        <form method="post" action="/instalacion/{{ q['id'] }}/guardar">
          <div class="mb-3">
            <label class="form-label fw-bold">Fecha de instalación</label>
            <input type="date" class="form-control" name="fecha_instalacion" required
                   value="{{ instalacion.fecha_instalacion if instalacion else '' }}">
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Técnico responsable</label>
            <input type="text" class="form-control" name="tecnico" required
                   placeholder="Ej: Carlos Mamani"
                   value="{{ instalacion.tecnico if instalacion else '' }}">
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Estado</label>
            <select class="form-select" name="estado">
              <option value="pendiente" {% if not instalacion or instalacion.estado == 'pendiente' %}selected{% endif %}>⏳ Pendiente</option>
              <option value="en_curso" {% if instalacion and instalacion.estado == 'en_curso' %}selected{% endif %}>🔧 En curso</option>
              <option value="completada" {% if instalacion and instalacion.estado == 'completada' %}selected{% endif %}>✅ Completada</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Notas de instalación (opcional)</label>
            <textarea class="form-control" name="notas_instalacion" rows="3"
                      placeholder="Dirección, observaciones, materiales adicionales...">{{ instalacion.notas_instalacion if instalacion else '' }}</textarea>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success flex-grow-1">Guardar</button>
            <a href="/historial" class="btn btn-outline-secondary">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
