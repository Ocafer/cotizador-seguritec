<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nueva cotización</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { padding: 14px; }
    .muted { opacity: .75; }
    input[type="number"] { min-width: 100px; }
  </style>
</head>
<body class="bg-light">
  <div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <div>
        <h4 class="mb-0">Nueva cotización</h4>
        <div class="muted">{{ empresa }} · Telf. {{ telf }}</div>
      </div>
      <div>
        <a class="btn btn-outline-secondary btn-sm" href="/historial">Historial</a>
      </div>
    </div>

    {% if request.query_params.get('err') %}
      <div class="alert alert-danger">{{ request.query_params.get('err') }}</div>
    {% endif %}

    <form method="post" action="/crear">
      <div class="card mb-3">
        <div class="card-body">
          <div class="row g-2">
            <div class="col-12 col-md-6">
              <label class="form-label">Nombre del cliente</label>
              <input class="form-control" name="client_name" required placeholder="Ej. Juan Pérez">
            </div>
            <div class="col-6 col-md-3">
              <label class="form-label">Tiempo de entrega</label>
              <input class="form-control" name="delivery_time" required placeholder="Ej. 2 días hábiles">
            </div>
            <div class="col-6 col-md-3">
              <label class="form-label">Validez (días)</label>
              <input class="form-control" type="number" name="validity_days" required value="7" min="1">
            </div>
            <div class="col-12">
              <label class="form-label">Notas (opcional)</label>
              <textarea class="form-control" name="notes" rows="2" placeholder="Condiciones, forma de pago, etc."></textarea>
            </div>
          </div>
        </div>
      </div>

      <div class="card mb-3">
        <div class="card-header d-flex justify-content-between align-items-center">
          <strong>Ítems</strong>
          <button type="button" class="btn btn-sm btn-primary" onclick="addEmptyRow()">+ Agregar</button>
        </div>
        <div class="card-body p-2">
          <div class="table-responsive">
            <table class="table table-sm align-middle" id="itemsTable">
              <thead>
                <tr>
                  <th style="min-width:260px;">Producto</th>
                  <th>Unidad</th>
                  <th>Cant.</th>
                  <th>P. Unit (Bs)</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="itemsBody">
              </tbody>
            </table>
          </div>
          <div class="muted small">
            Tip: puedes seleccionar un producto del catálogo y luego ajustar precio/cantidad según la obra.
          </div>
        </div>
      </div>

      <button class="btn btn-success w-100" type="submit">Generar PDF</button>
    </form>
  </div>

<script>
  const products = [
    {% for p in products %}
      { sku: "{{p.sku|e}}", name: "{{p.nombre|e}}", unit: "{{p.unidad|e}}", price: {{p.precio_bs}} },
    {% endfor %}
  ];

  function rowTemplate() {
    const opts = ['<option value="">-- Seleccionar --</option>']
      .concat(products.map(p => `<option value="${p.sku}">${p.name} (Bs ${p.price})</option>`))
      .join('');
    return `
      <tr>
        <td>
          <input type="hidden" name="item_sku" value="">
          <input type="hidden" name="item_name" value="">
          <div class="d-flex gap-2">
            <select class="form-select form-select-sm" onchange="onPick(this)">${opts}</select>
            <input class="form-control form-control-sm" placeholder="o escribe el ítem" oninput="onType(this)">
          </div>
        </td>
        <td><input class="form-control form-control-sm" name="item_unit" value="unidad"></td>
        <td><input class="form-control form-control-sm" type="number" step="0.01" name="item_qty" value="1" min="0"></td>
        <td><input class="form-control form-control-sm" type="number" step="0.01" name="item_unit_price" value="0" min="0"></td>
        <td><button type="button" class="btn btn-sm btn-outline-danger" onclick="removeRow(this)">X</button></td>
      </tr>
    `;
  }

  function addEmptyRow() {
    document.getElementById('itemsBody').insertAdjacentHTML('beforeend', rowTemplate());
  }

  function removeRow(btn) {
    btn.closest('tr').remove();
  }

  function onPick(sel) {
    const tr = sel.closest('tr');
    const typed = tr.querySelector('input[placeholder^="o escribe"]');
    const skuH = tr.querySelector('input[name="item_sku"]');
    const nameH = tr.querySelector('input[name="item_name"]');
    const unitI = tr.querySelector('input[name="item_unit"]');
    const priceI = tr.querySelector('input[name="item_unit_price"]');

    const p = products.find(x => x.sku === sel.value);
    if (!p) return;
    typed.value = p.name;

    skuH.value = p.sku;
    nameH.value = p.name;
    unitI.value = p.unit;
    priceI.value = p.price;
  }

  function onType(inp) {
    const tr = inp.closest('tr');
    const skuH = tr.querySelector('input[name="item_sku"]');
    const nameH = tr.querySelector('input[name="item_name"]');
    skuH.value = "";                 // escrito manual
    nameH.value = inp.value.trim();  // nombre manual
  }

  // start with 3 rows
  addEmptyRow(); addEmptyRow(); addEmptyRow();
</script>
</body>
</html>
