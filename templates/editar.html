<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Editar cotización</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="manifest" href="/static/manifest.json">
  <script>
    if ("serviceWorker" in navigator) navigator.serviceWorker.register("/static/sw.js");
  </script>
  <style>
    body { padding: 14px; }
    .muted { opacity: .75; }
    .result-item { cursor: pointer; }
    .result-item:hover { background: #f3f3f3; }
  </style>
</head>
<body class="bg-light">
  <div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <div>
        <h4 class="mb-0">Editar cotización N° {{ "%06d"|format(q["quote_no"]) }}</h4>
        <div class="muted">{{ empresa }} · Telf. {{ telf }}</div>
      </div>
      <div class="d-flex gap-2">
        <a class="btn btn-outline-secondary btn-sm" href="/nueva">Inicio</a>
        <a class="btn btn-outline-secondary btn-sm" href="/historial">Historial</a>
        <a class="btn btn-outline-danger btn-sm" href="/logout">Salir</a>
      </div>
    </div>

    <form method="post" action="/cotizacion/{{ q['id'] }}/editar">
      <div class="card mb-3">
        <div class="card-body">
          <div class="row g-2">
            <div class="col-12 col-md-6">
              <label class="form-label">Nombre del cliente</label>
              <input class="form-control" name="client_name" required value="{{ q['client_name'] }}">
            </div>
            <div class="col-6 col-md-3">
              <label class="form-label">Tiempo de entrega</label>
              <input class="form-control" name="delivery_time" required value="{{ q['delivery_time'] }}">
            </div>
            <div class="col-6 col-md-3">
              <label class="form-label">Validez (días)</label>
              <input class="form-control" type="number" name="validity_days" required min="1" value="{{ q['validity_days'] }}">
            </div>
            <div class="col-12">
              <label class="form-label">Notas (opcional)</label>
              <textarea class="form-control" name="notes" rows="2">{{ q['notes'] or '' }}</textarea>
            </div>
          </div>
        </div>
      </div>

      <!-- Buscador -->
      <div class="card mb-3">
        <div class="card-header"><strong>Buscar producto</strong></div>
        <div class="card-body">
          <input id="searchBox" class="form-control" placeholder="Escribe para buscar y agregar...">
          <div id="results" class="list-group mt-2"></div>
        </div>
      </div>

      <div class="card mb-3">
        <div class="card-header d-flex justify-content-between align-items-center">
          <strong>Ítems</strong>
          <button type="button" class="btn btn-sm btn-primary" onclick="addManualRow()">+ Ítem manual</button>
        </div>
        <div class="card-body p-2">
          <div class="table-responsive">
            <table class="table table-sm align-middle">
              <thead>
                <tr>
                  <th style="min-width:260px;">Producto</th>
                  <th>Unidad</th>
                  <th>Cant.</th>
                  <th>P. Unit (Bs)</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="itemsBody">
                {% for it in items %}
                <tr>
                  <td>
                    <input type="hidden" name="item_sku" value="{{ it['sku'] or '' }}">
                    <input type="hidden" name="item_name" value="{{ it['name'] }}">
                    <div><strong>{{ it['name'] }}</strong></div>
                    {% if it['sku'] %}<div class="text-muted small">{{ it['sku'] }}</div>{% endif %}
                  </td>
                  <td><input class="form-control form-control-sm" name="item_unit" value="{{ it['unit'] }}"></td>
                  <td><input class="form-control form-control-sm" type="number" step="0.01" name="item_qty" value="{{ it['qty'] }}" min="0"></td>
                  <td><input class="form-control form-control-sm" type="number" step="0.01" name="item_unit_price" value="{{ it['unit_price'] }}" min="0"></td>
                  <td><button type="button" class="btn btn-sm btn-outline-danger" onclick="removeRow(this)">X</button></td>
                </tr>
                {% endfor %}
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <button class="btn btn-success w-100" type="submit">Guardar cambios</button>
    </form>
  </div>

<script>
  const products = [
    {% for p in products %}
      { sku: "{{p.sku|e}}", cat: "{{p.categoria|e}}", name: "{{p.nombre|e}}", unit: "{{p.unidad|e}}", price: {{p.precio_bs}} },
    {% endfor %}
  ];

  function escapeHtml(s) {
    return String(s).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;");
  }

  function addRowFromProduct(p) {
    const html = `
      <tr>
        <td>
          <input type="hidden" name="item_sku" value="${escapeHtml(p.sku)}">
          <input type="hidden" name="item_name" value="${escapeHtml(p.name)}">
          <div><strong>${escapeHtml(p.name)}</strong><div class="text-muted small">${escapeHtml(p.sku)} · ${escapeHtml(p.cat)}</div></div>
        </td>
        <td><input class="form-control form-control-sm" name="item_unit" value="${escapeHtml(p.unit || 'unidad')}"></td>
        <td><input class="form-control form-control-sm" type="number" step="0.01" name="item_qty" value="1" min="0"></td>
        <td><input class="form-control form-control-sm" type="number" step="0.01" name="item_unit_price" value="${p.price}" min="0"></td>
        <td><button type="button" class="btn btn-sm btn-outline-danger" onclick="removeRow(this)">X</button></td>
      </tr>
    `;
    document.getElementById('itemsBody').insertAdjacentHTML('beforeend', html);
  }

  function addManualRow() {
    const html = `
      <tr>
        <td>
          <input type="hidden" name="item_sku" value="">
          <input type="hidden" name="item_name" value="">
          <input class="form-control form-control-sm" placeholder="Escribe el ítem" oninput="syncManualName(this)">
        </td>
        <td><input class="form-control form-control-sm" name="item_unit" value="unidad"></td>
        <td><input class="form-control form-control-sm" type="number" step="0.01" name="item_qty" value="1" min="0"></td>
        <td><input class="form-control form-control-sm" type="number" step="0.01" name="item_unit_price" value="0" min="0"></td>
        <td><button type="button" class="btn btn-sm btn-outline-danger" onclick="removeRow(this)">X</button></td>
      </tr>
    `;
    document.getElementById('itemsBody').insertAdjacentHTML('beforeend', html);
  }

  function syncManualName(inp) {
    const tr = inp.closest('tr');
    tr.querySelector('input[name="item_name"]').value = inp.value.trim();
  }

  function removeRow(btn) { btn.closest('tr').remove(); }

  const searchBox = document.getElementById("searchBox");
  const results = document.getElementById("results");

  function renderResults(list) {
    results.innerHTML = "";
    list.slice(0, 10).forEach(p => {
      const a = document.createElement("a");
      a.className = "list-group-item list-group-item-action result-item";
      a.innerHTML = `<div class="d-flex justify-content-between">
          <div>
            <div><strong>${escapeHtml(p.name)}</strong></div>
            <div class="text-muted small">${escapeHtml(p.sku)} · ${escapeHtml(p.cat)} · ${escapeHtml(p.unit)}</div>
          </div>
          <div class="text-nowrap"><strong>Bs ${p.price}</strong></div>
        </div>`;
      a.onclick = () => { addRowFromProduct(p); results.innerHTML=""; searchBox.value=""; searchBox.focus(); };
      results.appendChild(a);
    });
  }

  searchBox.addEventListener("input", () => {
    const q = searchBox.value.trim().toLowerCase();
    if (!q) { results.innerHTML = ""; return; }
    const filtered = products.filter(p =>
      (p.name||"").toLowerCase().includes(q) ||
      (p.sku||"").toLowerCase().includes(q) ||
      (p.cat||"").toLowerCase().includes(q)
    );
    renderResults(filtered);
  });
</script>
</body>
</html>
